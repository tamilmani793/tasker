name: Deploy Daily Tracker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required variables are set
        run: |
          if [ -z "${{ vars.SUPABASE_URL }}" ]; then
            echo "ERROR: SUPABASE_URL repository variable is not set."
            echo "Go to: Settings → Secrets and variables → Actions → Variables tab"
            echo "Add a variable named SUPABASE_URL with your Supabase project URL."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: SUPABASE_ANON_KEY repository secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → Secrets tab"
            echo "Add a secret named SUPABASE_ANON_KEY with your Supabase anon/public key."
            exit 1
          fi
          echo "Both SUPABASE_URL and SUPABASE_ANON_KEY are configured."

      - name: Inject environment variables into app
        run: |
          sed -i \
            "s|__SUPABASE_URL__|${{ vars.SUPABASE_URL }}|g" \
            index.html
          sed -i \
            "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            index.html

      - name: Verify injection succeeded
        run: |
          if grep -q '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__' index.html; then
            echo "ERROR: Placeholder substitution failed — unreplaced tokens still in index.html"
            exit 1
          fi
          echo "Injection verified: all placeholders replaced successfully."

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
